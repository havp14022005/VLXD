<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VLXD Hà Ánh</title>

<style>
/* ===== GIỮ NGUYÊN CSS CỦA BẠN ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}
body{
    background:url("assets/nen.jpg") no-repeat center center fixed;
    background-size:cover;
}
.navbar{
    background: rgba(255,105,135,0.85);
    padding:10px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.logo-img{width:50px;height:50px;border-radius:50%;}
.nav-links{display:flex;gap:20px;align-items:center;}
.nav-links a{color:white;text-decoration:none;}

.product-card{
    background:white;
    padding:10px;
    border-radius:10px;
}
.product-img{
    width:100%;
    height:200px;
    object-fit:contain;
}
.btn{padding:8px 12px;border:none;cursor:pointer}
.add-to-cart{background:green;color:white}
.cart-badge{
    background:red;
    color:white;
    border-radius:50%;
    padding:3px 6px;
    position:absolute;
    top:-5px;right:-10px;
}

/* LOGIN */
#account-box{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #000;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>
        <img src="assets/logonoi.png" class="logo-img">
    </div>

    <div class="nav-links">
        <a href="#" onclick="showHome()">Trang chủ</a>

        <div onclick="showCart()" style="position:relative;cursor:pointer">
            🛒
            <span id="cart-badge" class="cart-badge">0</span>
        </div>

        <a href="#" onclick="openAccount()">Tài khoản</a>
    </div>
</div>

<!-- SẢN PHẨM (GIỮ NGUYÊN ẢNH CỦA BẠN) -->
<div id="home">
<div class="product-card">
<img src="assets/ximang.jpg" class="product-img">
<h3>Xi măng</h3>
<p class="product-price">120000</p>
<button class="btn add-to-cart">Thêm</button>
</div>

<div class="product-card">
<img src="assets/cat.jpg" class="product-img">
<h3>Cát</h3>
<p class="product-price">850000</p>
<button class="btn add-to-cart">Thêm</button>
</div>

<div class="product-card">
<img src="assets/gach.jpg" class="product-img">
<h3>Gạch</h3>
<p class="product-price">7500</p>
<button class="btn add-to-cart">Thêm</button>
</div>

<div class="product-card">
<img src="assets/thep.jpg" class="product-img">
<h3>Thép</h3>
<p class="product-price">18000</p>
<button class="btn add-to-cart">Thêm</button>
</div>

<div class="product-card">
<img src="assets/oplat.jpg" class="product-img">
<h3>Ốp lát</h3>
<p class="product-price">95000</p>
<button class="btn add-to-cart">Thêm</button>
</div>

<div class="product-card">
<img src="assets/son.jpg" class="product-img">
<h3>Sơn</h3>
<p class="product-price">450000</p>
<button class="btn add-to-cart">Thêm</button>
</div>
</div>

<!-- GIỎ HÀNG -->
<div id="cart" style="display:none">
<h2>Giỏ hàng</h2>
<div id="cart-list"></div>
</div>

<!-- LOGIN -->
<div id="account-box">
<h3>Đăng nhập</h3>
<input id="user" placeholder="Tài khoản"><br><br>
<input id="pass" type="password" placeholder="Mật khẩu"><br><br>
<button onclick="login()">Đăng nhập</button>
<button onclick="closeAccount()">Đóng</button>
</div>

<script>
let cart=[];

/* ===== CART ===== */
document.querySelectorAll(".add-to-cart").forEach(btn=>{
btn.onclick=function(){
let card=this.closest(".product-card");
let name=card.querySelector("h3").innerText;
let price=parseInt(card.querySelector(".product-price").innerText);

let item=cart.find(x=>x.name==name);
if(item){item.qty++;}
else{cart.push({name,price,qty:1});}

updateCart();
}
});

function updateCart(){
let total=cart.reduce((s,i)=>s+i.qty,0);
document.getElementById("cart-badge").innerText=total;
}

function showCart(){
document.getElementById("home").style.display="none";
document.getElementById("cart").style.display="block";

let html="";
cart.forEach(i=>{
html+=`
<div>
${i.name} - ${i.qty}
</div>`;
});
document.getElementById("cart-list").innerHTML=html;
}

function showHome(){
document.getElementById("home").style.display="block";
document.getElementById("cart").style.display="none";
}

/* ===== ACCOUNT ===== */
function openAccount(){
document.getElementById("account-box").style.display="block";
}
function closeAccount(){
document.getElementById("account-box").style.display="none";
}

function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="123"){
alert("Đăng nhập thành công");
closeAccount();
}else{
alert("Sai tài khoản");
}
}
</script>

</body>
</html>
