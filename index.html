<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VLXD Hà Ánh</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}

body{
background:#f5f5f5;
}

/* NAV */
.navbar{
background:#c0392b;
padding:10px 5%;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

/* CHAT FIX */
.chat-popup{
position:fixed;
bottom:20px;
right:20px;
width:320px;
height:420px;
background:#fff;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.25);
display:none;
flex-direction:column;
overflow:hidden;
z-index:999;
}

.chat-header{
background:#c0392b;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

.close-chat{
cursor:pointer;
font-size:18px;
}

.chat-messages{
flex:1;
padding:10px;
overflow-y:auto;
background:#f5f5f5;
display:flex;
flex-direction:column;
gap:8px;
}

.chat-message{
padding:8px 12px;
border-radius:15px;
max-width:70%;
font-size:14px;
}

.sent{
background:#2980b9;
color:white;
align-self:flex-end;
}

.received{
background:#e0e0e0;
align-self:flex-start;
}

.chat-input{
display:flex;
border-top:1px solid #ddd;
}

.chat-input input{
flex:1;
padding:10px;
border:none;
outline:none;
}

.chat-input button{
background:#27ae60;
color:white;
border:none;
padding:0 15px;
cursor:pointer;
}

.chat-toggle{
position:fixed;
bottom:20px;
right:20px;
width:55px;
height:55px;
background:#c0392b;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
cursor:pointer;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="navbar">
<h2>VLXD Hà Ánh</h2>
</div>

<!-- CHAT POPUP -->
<div id="chat" class="chat-popup">

<div class="chat-header">
<span>Hỗ trợ khách hàng</span>
<span class="close-chat" onclick="toggleChat()">✖</span>
</div>

<div id="messages" class="chat-messages">
<div class="chat-message received">Xin chào 👋 bạn cần hỗ trợ gì?</div>
</div>

<div class="chat-input">
<input id="input" placeholder="Nhập tin nhắn..." onkeypress="handleKey(event)">
<button onclick="send()">Gửi</button>
</div>

</div>

<!-- BUTTON -->
<div class="chat-toggle" onclick="toggleChat()">💬</div>

<script>
let open=false;

function toggleChat(){
open=!open;
document.getElementById("chat").style.display=open?"flex":"none";
}

/* SEND MESSAGE */
function send(){
let input=document.getElementById("input");
let text=input.value.trim();
if(text==="") return;

let box=document.getElementById("messages");

/* message mình */
box.innerHTML+=`<div class="chat-message sent">${text}</div>`;
input.value="";
box.scrollTop=box.scrollHeight;

/* auto trả lời */
setTimeout(()=>{
box.innerHTML+=`<div class="chat-message received">Shop đã nhận: "${text}"</div>`;
box.scrollTop=box.scrollHeight;
},800);
}

/* ENTER để gửi */
function handleKey(e){
if(e.key==="Enter") send();
}
</script>

</body>
</html>
