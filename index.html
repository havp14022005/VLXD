<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VLXD Hà Ánh</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}

body{
    background: url("assets/nen.jpg") no-repeat center center fixed;
    background-size: cover;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.4);
    z-index:-1;
}

/* NAVBAR */
.navbar{
    background:rgba(255,105,135,0.85);
    padding:10px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo-container{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo-img{
    width:50px;height:50px;border-radius:50%;
}

.nav-links{
    display:flex;
    gap:20px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    cursor:pointer;
}

/* PRODUCT */
#home{
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.product-card{
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.product-img{
    width:100%;
    height:180px;
    object-fit:contain;
}

.product-price{
    color:red;
    font-weight:bold;
}

.btn{
    padding:10px;
    border:none;
    background:#27ae60;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

/* SECTION */
.cart-section{
    display:none;
    background:white;
    padding:20px;
    margin:20px;
    border-radius:10px;
}

/* CHAT */
.chat-popup{
    position:fixed;
    bottom:20px;
    right:20px;
    width:300px;
    background:white;
    border-radius:10px;
    display:none;
}

.chat-popup.open{display:block;}

.chat-messages{
    height:200px;
    overflow:auto;
}

.chat-message{
    padding:5px;
}

.sent{color:blue;text-align:right;}
.received{color:black;}

/* ACCOUNT */
input{
    width:100%;
    padding:10px;
    margin:5px 0;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar">
<div class="logo-container">
<img src="assets/logonoi.png" class="logo-img">
<h2>VLXD HÀ ÁNH</h2>
</div>

<div class="nav-links">
<a onclick="showView('home')">Trang chủ</a>
<a onclick="displayCart()">Giỏ hàng (<span id="cart-badge">0</span>)</a>
<a onclick="showView('account')">Tài khoản</a>
</div>
</nav>

<!-- HOME -->
<section id="home">

<div class="product-card">
<img src="assets/ximang.jpg" class="product-img">
<h3>Xi măng</h3>
<p class="product-price">120000</p>
<button class="btn add-to-cart">Thêm</button>
</div>

<div class="product-card">
<img src="assets/gach.jpg" class="product-img">
<h3>Gạch</h3>
<p class="product-price">7500</p>
<button class="btn add-to-cart">Thêm</button>
</div>

</section>

<!-- CART -->
<section id="cart-section" class="cart-section">
<h2>Giỏ hàng</h2>
<div id="cart-list"></div>
<div id="total-price"></div>
<button onclick="showCheckout()">Thanh toán</button>
</section>

<!-- CHECKOUT -->
<section id="checkout" class="cart-section">
<h2>Thanh toán</h2>
<div id="order-summary"></div>
<div id="final-total"></div>
</section>

<!-- ACCOUNT -->
<section id="account" class="cart-section">
<h2>Tài khoản</h2>

<div id="login-form">
<input id="username" placeholder="User">
<input id="password" type="password" placeholder="Pass">
<button onclick="login()">Đăng nhập</button>
<p onclick="showRegister()">Đăng ký</p>
</div>

<div id="register-form" style="display:none">
<input id="reg-username" placeholder="User">
<input id="reg-password" type="password" placeholder="Pass">
<button onclick="register()">Đăng ký</button>
<p onclick="showLogin()">Đăng nhập</p>
</div>

<div id="user-info" style="display:none">
Xin chào <b id="current-user"></b>
<button onclick="logout()">Đăng xuất</button>
</div>

</section>

<!-- CHAT -->
<div class="chat-popup" id="chat-popup">
<div class="chat-messages" id="chat-messages"></div>
<input id="chat-input">
<button onclick="sendMessage()">Gửi</button>
</div>

<script>

let cart=[];
let currentUser=localStorage.getItem("currentUser");

// VIEW
function showView(view){
    document.getElementById("home").style.display=view==="home"?"grid":"none";
    document.getElementById("cart-section").style.display=view==="cart"?"block":"none";
    document.getElementById("checkout").style.display=view==="checkout"?"block":"none";
    document.getElementById("account").style.display=view==="account"?"block":"none";
}

// CART
document.querySelectorAll(".add-to-cart").forEach(btn=>{
btn.onclick=function(){
let card=this.parentElement;
let name=card.querySelector("h3").innerText;
let price=parseInt(card.querySelector(".product-price").innerText);

let item=cart.find(i=>i.name===name);
if(item){item.qty++;}
else{cart.push({name,price,qty:1});}

updateCart();
alert(`Đã thêm ${name}`);
};
});

function updateCart(){
let totalQty=0;
cart.forEach(i=>totalQty+=i.qty);
document.getElementById("cart-badge").innerText=totalQty;
}

function displayCart(){
showView("cart");

let html="";
let total=0;

cart.forEach((i,index)=>{
let t=i.price*i.qty;
total+=t;

html+=`
<div>
${i.name} x ${i.qty} = ${t}
<button onclick="removeItem(${index})">X</button>
</div>`;
});

document.getElementById("cart-list").innerHTML=html;
document.getElementById("total-price").innerText="Tổng: "+total;
}

function removeItem(i){
cart.splice(i,1);
displayCart();
}

// CHECKOUT
function showCheckout(){
showView("checkout");

let html="";
let total=0;

cart.forEach(i=>{
let t=i.price*i.qty;
total+=t;
html+=`<p>${i.name} - ${t}</p>`;
});

document.getElementById("order-summary").innerHTML=html;
document.getElementById("final-total").innerText="Tổng: "+total;
}

// ACCOUNT
function updateAccountUI(){
if(currentUser){
login-form.style.display="none";
register-form.style.display="none";
user-info.style.display="block";
current-user.innerText=currentUser;
}else{
login-form.style.display="block";
register-form.style.display="none";
user-info.style.display="none";
}
}

function register(){
let u=reg-username.value;
let p=reg-password.value;
localStorage.setItem("user_"+u,p);
alert("OK");
showLogin();
}

function login(){
let u=username.value;
let p=password.value;

if(localStorage.getItem("user_"+u)===p){
localStorage.setItem("currentUser",u);
currentUser=u;
updateAccountUI();
}else alert("Sai");
}

function logout(){
localStorage.removeItem("currentUser");
currentUser=null;
updateAccountUI();
}

function showRegister(){
login-form.style.display="none";
register-form.style.display="block";
}

function showLogin(){
login-form.style.display="block";
register-form.style.display="none";
}

// CHAT
function sendMessage(){
let text=chat-input.value;
if(!text)return;

chat-messages.innerHTML+=`<div class="sent">${text}</div>`;
chat-input.value="";

setTimeout(()=>{
chat-messages.innerHTML+=`<div class="received">Shop sẽ phản hồi</div>`;
},500);
}

// INIT
document.addEventListener("DOMContentLoaded",()=>{
showView("home");
updateCart();
updateAccountUI();
});

</script>

</body>
</html>
